人絶子女肩齵相對主痿留壯數灸之宜推求腹連殗殜骨蒸患四花一灸可無憂環跳取時須側卧冷痺筋攣足不收轉筋速灸承山上太衝寒疝即時瘳腳氣三里及風市腰痛崑崙曲踿裏復溜偏治五淋病湧泉無孕須懷子隂中濕癢隂蹻間便疝大敦足大指癲邪之病及五癎手足四處艾俱起風拄地痛足䯒疼京歷付陽與僕參心如錐刺太溪上睛痛宜去灸拳尖歷節痛風兩處穴飛揚絶骨可安痊脾虛腹脹身浮腫大都三里艾宜燃赤白痢下中膂取背脊三焦最宜主臂疼手痛手三里腕骨肘髎與中渚巨骨更取穴譩嘻肩背痛兼灸天柱腰腧一穴最為竒艾灸中間腰痛愈醉飽俱傷面目黃但灸飛揚及庫房額角偏頭疼灌注頭風眼淚視昏昏傷寒熱病身無汗細詳孔最患無妨寒氣繞臍心痛急天樞二穴夾臍傍女人經候不勻調中極氣海與中髎月閉乳癰臨泣妙􅛎聚膀胱即莫拋乳汁少時亶中穴夜間遺溺覓隂包足疼足弱步難履委中更有三隂交心神怔忡多健忘頂心百會保安康兩丸牽痛隂痿縮四滿中封要忖量四直臍心灸便瀝胞轉蔥吹溺出良忽然夢魘歸泉速拇指毛中最可詳腦熱腦寒并腦溜𩕄會穴中宜著灸鼻中􅶘肉氣難通灸取上星辨香臭天突結喉兩旁間能愈痰涎并咳嗽忽然癎發身旋倒九椎筋縮無差謬癰疽雜病能為先蒜艾當頭急用撚犬咬蛇傷灸痕迹牙疼義手及肩尖噎塞乳根一寸穴四椎骨下正無偏大便失血陽虛脫臍心對脊效天然又歌曰心疼巨闕穴中求肩井曲池軀背痛眼胸肝腧及命門足躄懸鍾環跳中隂蹻陽維治胎停照海能於喉閉用大鍾一穴療心癡太衝腹痛須勤誦脾胃疼痛㵼公孫胸腹痛滿內關分勞嗽應須瀉魄户筋攣骨痛銷魂門眼痛睛明及魚尾隂郤盜汗却堪聞若也中風在環跳小兒骨蒸偏歷尊行步艱難太衝取虛損天樞實為主要知脊痛治人中癡呆只向神門許風傷項急風府尋頭眩風池吾語汝耳閉聽會眼合谷承漿偏療項難舉胸結身黃在湧泉腦昏目赤攢竹穿兩肘拘攣曲池取轉筋却向承山先宣導氣衝與太白開通水道隂陵邊腳腕痛時崑崙取股膝疼痛隂市便癲癎後溪瘧間使心痛勞苦實堪治胸滿脅脹取期門大敦七疝兼偏墜怯黃偏在腕骨中五勞羸瘦求三里膝腫目疾行間求肘痛筋攣尺澤試若也鼻塞取迎香兩股痠疼肩井良偏頭風痛瀉攢竹咳唾寒痰列缺強迎風冷淚在臨泣委中腎腧治腰行三隂交中死胎下心胸如病太陵將肩背患時手三里兩足冷痺腎腧擬脅下筋邊取陽陵脊心如痛針中渚頭強項硬刺後溪欲知祕訣誰堪侣此法傳從竇太師後人行之踏規矩灸法雜抄切要食多而身瘦者名食晦宜灸脾腧食罷而貪睡卧者名脾困宜灸中脘腦虛冷衄風寒入腦久逺成疾宜灸𩕄會飲食不消心腹脹面色痿黃世謂之脾腎病宜灸中脘久冷傷憊臟腑泄利不止中風不省人事等疾宜灸神門臟氣虛憊真氣不足一切氣疾久痞老者宜灸氣海臟腑虛乏下元冷憊等疾宜灸丹田陽氣虛憊失精絶子宜灸中極十二經脈皆有腧原手足隂陽之交會血氣之流通外營筋節內連臟腑經云手三陽之脈從手至頭手三隂之脈從手至胸足三陽之脈從頭至足足三隂之脈從足至胸日夜循環隂陽會合又曰春夏刺淺秋冬刺深緣春夏陽氣在上人氣亦在上所當淺取之秋冬陽氣在下人氣亦在下所當深取之所謂井滎腧原經合者凡孔穴流注所出為井所流為滎所注為腧所過為原所行為經所入為合此針之大法也春刺井夏刺滎季夏刺腧秋刺經冬刺合也飛騰八法起例甲己子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌丑巳亥屬之四右並以日時天干地支配合得數以九除之取零數合卦定穴八卦數例一坎二坤三震四巽五中男寄坤女寄艮六乾七兊八艮九離右以干支九數除零合卦乾屬公孫艮內關震宫居外巽溪間外關後溪離居列缺坤申脈照海臨泣兊坎觀兑照海坎臨泣右以九除零數合卦定穴合穴公孫內關臨泣外關後溪申脈照海列缺定八穴所在公孫二穴足太隂脾之經在足大趾內側本節後一寸陷中令病人坐踡兩足底相取之合內關穴內關二穴手厥隂心之經在手掌後二寸令病人穩坐仰手取之臨泣二穴足少陽膽之經在足小趾次趾本節後一寸陷中一云去俠溪一寸五分令病人垂足取之亦合於外關外關二穴手少陽三焦經在手腕後二寸别起心主令病人穩坐覆手取之後溪二穴手太陽小腸之經在手小指外側本節後陷中令病人穩坐覆手取之申脈二穴足太陽膀胱經在足外踝下赤白肉際陷中令病人垂腳坐取之合於後溪照海二穴足少隂腎之經在足內踝下赤白肉際陷中令病人穩坐足底相對取之合列缺列缺二穴手太隂肺之經在腕後一寸半兩手相義食指頭盡處筋骨罅間是合照海扁鵲神應針灸玉龍經扁鵲神應針灸玉龍經後序玉龍經者婺源王先生所傳針灸之書也其所以托名扁鵲者重其道而神其書也名曰玉龍者蓋以玉為天地之精龍之神變極靈此書之妙用亦猶是也愚自蚤嵗蒙親授以來遊藝于七閩兩浙之間者幾四十年遇病輒醫醫必見效信此書之道猶玉之孚尹旁達光焰愈久而不磨龍之行天施澤之無窮變化愈神而人莫得而測也由是拜手述其所以指用識于卷之末云天厯二年嵗在己巳武林後學周仲良書于錦山躋壽堂
