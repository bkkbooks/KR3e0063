body:
  text: 扁鵲神應針灸玉龍經醫家類提要臣等謹案扁鵲神應針灸玉龍經一卷元王國端撰國端婺源人其書専論針灸之法首為一百二十穴玉龍歌八十五首次為注解標幽賦一篇次為天星十一穴歌訣十二首次為人神尻神太乙九宫歌訣次為六十六穴治證次為子午流注心要祕訣次為日時配合六法圖次為盤石金直刺祕傳次又附以針灸歌及雜録切要後有天厯二年國端弟子周仲良跋稱托名扁鵲者重其道而神之其中名目頗涉鄙俚文義亦多淺近而剖析簡要循覽易明非精於其技者亦不能言之切當若是也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書扁鵲神應針灸玉龍經元王國瑞撰一百二十穴玉龍歌扁鵲授我玉龍歌玉龍一試痊沈疴玉龍之歌世罕得研精心手無差訛吾今歌此玉龍訣玉龍一百二十穴行針殊絶妙無比但恐時人自差别補㵼分明指下施金針一刺顯良醫傴者立伸患者起從此名馳湖海知曲池補人中瀉風池補絶骨㵼中風中風不語最難醫頂門髮際亦堪施百會穴中明補㵼即時蘇醒免災危頂門即𩕄會穴上星後一寸禁不可刺灸七壯針㵼之百會頂中央旋毛中取眉間印堂至髮際折中是穴針一分許中風先補後㵼多補少瀉灸七壯無補口眼喎斜中風口眼致喎斜須療地倉連頰車喎左瀉右依師語喎右㵼左莫教差地倉在口傍直縫帶路下針一分頰車在耳後墜下三分沿皮向下透地倉一寸半灸二七壯頭風頭風嘔吐眼昏花穴在神庭刺不差子女驚風皆可治印堂刺入艾來加神庭在鼻直上入髮際五分針三寸先補後㵼㵼多補少印堂在兩眉間宛宛中針一分沿皮先透左攢竹補㵼後轉歸元穴退右攢竹依上補㵼可灸七壯小兒驚風灸七壯大哭者為效不哭者難治隨症急慢補㵼急者慢補慢者急㵼通神之穴也偏正頭風頭風偏正最難醫絲竹金針亦可施更要沿皮透率合一針兩穴世間稀絲竹在眉後入髮際陷中沿皮向後透率谷在耳尖上一寸針三分灸七壯開口刺痛則㵼眩暈則補頭風痰飲宜㵼風池穴偏正頭風有兩般風池穴內㵼因痰若還此病非痰飲合谷之中仔細看風池在耳後顳顬骨筋下入髮際橫針一寸半入風府先補後㵼可灸七壯二七壯合谷一名虎口在手大指次指岐骨縫中脈應手直刺入一寸半看虛實補瀉頭項強痛項強兼頭四顧難牙疼併作不能寬先向承漿明補㵼後針風府即時安承漿在唇下宛宛中直針三分可灸七壯㵼之風府在項後入髮際一寸兩筋間言語則起不言語則陷下處是穴針三分不可深深則令人啞噤牙疼附嘔吐牙疼陳陳痛相煎針灸還須覓二間翻嘔不禁兼吐食中魁竒穴試看看二間在手大指次指骨縫中針一分沿皮向後三分灸七壯看虛實補㵼中魁在中指第二節尖灸二七壯㵼之禁針乳鵝乳鵝之症更希竒急用金針病可醫若使遲延難整治少商出血始相宜少商在大指甲邊內側端去爪甲如薤葉針入一分沿皮向後三分㵼之三稜針出血應合谷鼻淵鼻流清涕名鼻淵先㵼後補疾可痊若更頭風并眼痛上星一穴刺無偏上星在髮際一寸半取穴以手掌後橫文按鼻尖中指頭盡處是穴直針三分灸七壯鼻淵則補不聞香臭則㵼應大淵穴見後痰嗽歌不聞香臭不聞香臭從何治須向迎香穴內攻先補後瀉分明記金針未出氣先通迎香在鼻孔傍五分縫中直針一分沿皮向後上三分㵼多補少禁灸眉目間痛眉目疼痛不能當攢竹沿皮刺不妨若是目疼亦同治刺入頭維疾自康攢竹在眉尖陷中針二分沿皮向魚腰㵼多補少禁灸頭維在額角髮際沿皮向下透至懸鐘是穴在額角疼痛㵼眩暈補灸二七壯愈心痛九般心痛及脾疼上脘穴中宜用針脾敗還將中脘㵼兩針成敗免災侵上脘在臍上五寸直刺三寸半看虛實補㵼中脘在臍上四寸法用草從鳩尾下至臍折中是穴直刺二寸五分灸五十壯止補多㵼少三焦三焦邪氣擁上焦舌乾口苦不和調針刺關衝出毒血口生津液氣俱消關衝在手小指次指內側端如韭葉大針一分沿皮向後三分㵼禁灸小指次指者無名指也上焦熱附心虛膽寒少衝穴在手少隂其穴功多必可針心虛膽寒還㵼補上焦熱湧手中尋少衝在手小指內側端去爪甲如韭葉大直刺一分沿皮向後三分看虛實補㵼禁灸通里在腕後起骨上一寸直針一分宜㵼不宜補愈補愈發禁灸癡呆癡呆一症少精神不識尊卑最苦人神門獨治癡呆病轉手骨開得穴真神門在手掌後高骨陷中針入三分灸七壯應後溪穴目赤眼睛紅腫痛難熬怕日羞明心自焦但刺睛明魚尾穴太陽出血病全消睛明在目內眥淚孔中針入一分半略針向鼻㵼禁灸魚尾即瞳子窖在目上眉外尖針一分沿皮向內透魚腰㵼禁灸太陽在額紫脈上可出血目病隱澀忽然眼痛血貫晴隱澀羞明最可憎若是太陽除毒血不須針刺自和平太陽在額紫脈上出血三稜針刺之應睛明穴目熱心血炎上兩眼紅好將蘆葉搐鼻中若還血出真為美目內清涼顯妙功內迎香在鼻孔內用蘆葉或箬葉作卷搐之血出為好應合谷穴目爛風眩爛眼可憐人淚出汪汪實苦辛大小骨空真妙穴灸之七壯病除根大骨空在手大拇指第二節尖上灸七壯小骨空在手小指第二節尖上灸七壯禁針目昏肝家血少目昏花肝腧之中補更佳三里㵼來肝血益雙瞳朗朗淨無瑕肝腧在背九椎兩傍各一分寸半灸七壯針入二三里在膝下三寸貼骨外廉針三分㵼之耳聾附紅腫生瘡耳聾氣閉不聞音痛癢蟬吟總莫禁紅腫生瘡須用㵼只從聽會用金針聽會在耳珠前陷中口開方可下針橫下針刺半寸灸二七壯應合谷足三里聾癧二症若人患耳即成聾下手先須覓翳風項上倘然生癧子金針㵼動號良工翳風在耳後陷中開口得穴針入半寸㵼之灸七壯瘖啞啞門一穴兩筋間專治失音言語難此穴莫深惟是淺刺深翻使病難安啞門在項後入髮際五分直針三分莫深深則令人啞㵼之不補灸七壯痰嗽喘急咳嗽喘急及寒痰須從列缺用針看太淵亦㵼肺家疾此穴仍宜灸更安列缺在大指直上義手中指盡處是穴針入三分橫針向臂㵼之太淵在掌後陷中三分㵼之咳嗽腰痛附黃疸忽然咳嗽腰膂痛身柱由來穴更真至陽亦醫黃疸病先㵼後補妙通神身柱在背第三椎骨節針三分灸七壯㵼之至陽在背第七椎骨節尖針三分灸七壯看虛實補㵼傷風傷風不解咳頻頻久不醫之勞病終咳嗽須針肺腧穴痰多必用刺豐隆肺腧在第三椎下兩傍各一寸五分宛中灸三壯豐隆在足腕解溪上八寸直針二分半看虛實補㵼灸二七壯咳嗽鼻流清涕腠理不密咳嗽頻鼻流清涕氣昏沈噴嚏須針風門穴咳嗽還當艾火深風門在第二椎下兩傍各一寸半陷中喘哮喘一症最難當夜間無睡氣遑遑天突尋之真妙穴膻中一灸便安康天突在結喉陷中針可針下半寸灸七壯㵼之膻中在兩乳中間可㵼灸七壯禁針氣喘氣喘吁吁不得眠何當日夜苦相煎若取璇璣真箇妙更針氣海保安然璇璣在天突下一寸直針入三分㵼之灸七壯氣海在臍下一寸五分宛宛中刺入三分灸七壯看病補㵼哮喘痰嗽哮喘咳嗽痰飲多才下金針疾便和腧府乳根一般刺氣喘風痰漸漸磨腧府在巨骨下璇璣傍二寸陷中針三分灸三壯看虛實補㵼乳根在乳下一寸六分陷中仰而取之針一分灸五壯至七壯看病補㵼口氣口氣由來最可憎只因用意苦勞神太陵穴共人中瀉心臟清涼口氣清太陵在掌後橫文中針三分㵼之人中在鼻下三分陷中針三分直針向上氣滿小腹脹滿氣攻心內庭二穴刺須真兩足有水臨泣㵼無水之時不用針內庭在足兩指岐骨間直刺三分可㵼補灸二七壯臨泣在夾渙上三指四指間針三分禁灸可以出一身之水㵼用香油抹孔穴則針孔不開氣附心悶手生瘡勞宫穴在掌中心滿手生瘡不可禁心悶之疾太陵㵼氣攻胸腹一般針勞宫在掌心屈無名指盡處是穴針三分灸七壯太陵見前肩腫痛肩端紅腫痛難當寒濕相摶氣血狂肩髃穴中針一遍頓然神效保安康肩髃在肩端上舉手陷中針二寸半若手臂紅腫疼痛㵼之寒濕麻木補之肘攣筋痛二首兩肘拘攣筋骨痛舉動艱難疾可憎若是曲池針㵼動更醫尺澤便堪行曲池在肘後外輔尺澤在肘中大筋外陷中用手如弓方可下針先補後㵼針半寸禁灸筋急不和難舉動穴法從來尺澤真若遇頭面諸般疾一針合谷妙通神尺澤合谷並見前臂痛兩胛疼痛氣攻胸肩井二穴最有功此穴由來真氣聚㵼多補少應針中肩井在肩端上缺盆盡處直針寸半停針此穴五藏真氣聚不宜補不宜灸停針氣虛人多暈亂急㵼之三里應支溝穴肩背痛肩臂風連背亦疼用針胛縫妙通靈五樞本治腰疼病入穴分明疾頓輕五樞在臂部肩端骨下直縫尖針入二寸半灸二七壯看虛實補㵼虛虛羸有穴是膏肓此法從來要度量禁穴不針宜灼艾灸之干壯亦無妨膏肓在背骨四椎下微約五椎上微少四肋三間是穴各三寸用竹杖兩手撑開陷中是穴虛弱夜起老人虛弱小便多夜起頻頻更若何針助命門真妙穴艾加腎腧疾能和命門在背骨十四椎下與臍平灸二七壯禁針針則愈甚宜補不宜㵼腎腧在命門兩傍各一寸半灸法依前針法依前膽寒心驚鬼交白濁膽寒先是怕心驚白濁遺精苦莫禁夜夢鬼交心腧㵼白環腧穴一般針心腧在背五椎兩傍一寸半沿皮向外一寸半灸七壯不可多先補後㵼亦不宜多補白環腧在二十一椎兩傍一寸半直針一寸半灸五十壯夜夢鬼交婦人白濁宜補多勞證傳尸勞病最難醫湧泉穴內沒憂疑痰多須向豐隆㵼喘氣丹田亦可施湧泉在腳底心轉足三縫中又以二指至足跟盡處折中是穴直針三分傷寒勞瘵有血可燎無則危先補後㵼丹田在臍下三寸針八分補多㵼少可灸百壯豐隆見前盜汗滿身發熱病為虛盜汗淋漓却損軀穴在百勞椎骨上金針下著疾根除百勞在背第一椎骨尖上針三分灸二七壯㵼之應肺腧穴腎虛腰痛腎虛腰痛最難當起坐艱難步失常腎腧穴中針一下多加艾火灸無妨腎腧見前腰脊強痛脊膂強痛㵼人中挫閃腰疼亦可針委中也是腰疼穴任君取用兩相通人中即水溝穴在鼻下三分銜水突起處是穴針三分向上些少㵼無補法灸七壯委中在膝後膕文動脈中針一寸見血即愈手腕疼腕中無力或麻􅍙舉指痠疼握物難若針腕骨真竒妙此穴尤宜仔細看腕骨在手腕起骨前陷中畨手得穴針入三分灸二七壯㵼之手麻木則補可灸三七壯臂腕痛手臂相連手腕疼液門穴內下針明更有一穴明中渚㵼多勿補疾如輕液門在手小指次指本節後針入一分沿皮向後透入陽池㵼之中渚在小指次指岐骨間本節後針入一分沿皮向後透膉骨㵼之虛煩連日虛煩面赤粧心中驚恐亦難當通里心原真妙穴神針一刺便安康通里在腕後側起骨後一寸直針半寸㵼之禁灸腹中氣塊腹中氣塊最為難須把金針刺內關八法隂維名妙穴肚中諸疾可平安內關在手掌後橫文二寸兩筋間直刺透外關先補後㵼名隂維穴禁灸應照海穴腹痛腹中疼痛最難當宜刺太陵并外關若是腹疼兼閉結支溝竒穴保平安外關在腕後骨上二寸直針透內關先補後㵼灸七壯太陵見前支溝在腕後三寸對間使針三分透間使灸七壯間使見後瘧疾下吹乳婦人吹乳痛難熬吐得風痰疾可調少澤穴中明補㵼金針下了腫全消少澤在手小指端外側去爪甲如韭葉大則一分沿皮向後三分乳疽疾疼痛補以吐為效白帶婦人白帶亦難治須用金針取次施下元虛憊補中極灼艾尤加仔細推中極在臍下四寸直